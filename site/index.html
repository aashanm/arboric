        'a2-highgpu-4g':      { on_demand: 14.69, spot_floor_discount: 0.65, gpu: 'A100 (4x)', use_case: 'Distributed training' },

        'g2-standard-4':      { on_demand: 0.90,  spot_floor_discount: 0.73, gpu: 'L4 (1x)',   use_case: 'Inference' },
        'g2-standard-16':     { on_demand: 3.59,  spot_floor_discount: 0.70, gpu: 'L4 (4x)',   use_case: 'Batch inference' },
      },

        'Standard_NC24s_v3':     { on_demand: 12.24, spot_floor_discount: 0.65, gpu: 'V100 (4x)', use_case: 'Distributed training' },
        'Standard_ND96asr_v4':   { on_demand: 27.20, spot_floor_discount: 0.60, gpu: 'A100 (8x)', use_case: 'Foundation model training' },
        'Standard_NC4as_T4_v3':  { on_demand: 0.526, spot_floor_discount: 0.74, gpu: 'T4 (1x)',   use_case: 'Inference' },
        'Standard_NC16as_T4_v3': { on_demand: 1.204, spot_floor_discount: 0.71, gpu: 'T4 (4x)',   use_case: 'Batch inference' },
      },
    };

    const DEFAULT_INSTANCE = { on_demand: 12.24, spot_floor_discount: 0.68 };

    // Normalization ceilings from autopilot.py _calculate_window_score
    const PRICE_CEILING = 35.0;
    const CARBON_CEILING = 600;
    const DEFAULT_PRICE_WEIGHT = 0.7;
    const DEFAULT_CARBON_WEIGHT = 0.3;

    // Performance fee from pitch doc
    const PERFORMANCE_FEE = 0.20;

    // SB 253 deadline
    const SB253_DEADLINE = new Date('2027-01-01T00:00:00');

    /* ================================================================
       SEEDED PRNG — deterministic output per CLAUDE.md
       ================================================================ */
    function mulberry32(seed) {
      let a = seed | 0;
      return function() {
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), a | 1);
        t ^= (t + Math.imul(t ^ (t >>> 7), t | 61));
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function seededGauss(rng, mean, stddev) {
      const u1 = rng();
      const u2 = rng();
      const z = Math.sqrt(-2 * Math.log(u1 || 1e-10)) * Math.cos(2 * Math.PI * u2);
      return mean + z * stddev;
    }

    /* ================================================================
       GRID ORACLE — ported from grid_oracle.py
       ================================================================ */
    function createMockGrid(region, seed = 42, instanceType = null, provider = null) {
      const profile = REGION_PROFILES[region];
      if (!profile) throw new Error(`Unknown region: ${region}`);

      // Resolve instance profile
      let instanceProfile = DEFAULT_INSTANCE;
      if (provider && instanceType && INSTANCE_PROFILES[provider]) {
        instanceProfile = INSTANCE_PROFILES[provider][instanceType] || DEFAULT_INSTANCE;
      }

      const rng = mulberry32(seed);
      const dailyCarbonShift = rng() * 60 - 30;       // uniform(-30, 30)
      const dailyPriceShift  = rng() * 0.04 - 0.02;   // uniform(-0.02, 0.02)
      const weatherFactor    = rng() * 0.4 + 0.8;      // uniform(0.8, 1.2)

      function calcSolarFactor(hour) {
        const solarPeak = 13.0;
        const solarWidth = 2.5;
        let sf = Math.exp(-Math.pow(hour - solarPeak, 2) / (2 * solarWidth * solarWidth));
        sf *= weatherFactor;
        if (hour < 6 || hour > 20) sf = 0;
        return Math.min(1, Math.max(0, sf));
      }

      function calcCarbon(hour) {
        const sf = calcSolarFactor(hour);
        const solarReduction = profile.carbon_amplitude * 1.2 * sf;
        let evening = 0;
        if (hour >= 16 && hour <= 22) {
          const d = Math.abs(hour - 19);
          evening = 120 * Math.exp(-d * d / (2 * 2.5 * 2.5));
        }
        let night = 0;
        if (hour < 6 || hour > 21) night = 80;
        const noise = seededGauss(rng, 0, 10);
        const val = profile.base_carbon - solarReduction + evening + night + dailyCarbonShift + noise;
        return Math.max(50, Math.min(800, val));
      }

      function calcPrice(hour) {
        const onDemand = instanceProfile.on_demand;
        const floorPrice = onDemand * (1 - instanceProfile.spot_floor_discount);
        const peakPrice = onDemand * (1 - profile.spot_peak_discount);
        const priceRange = peakPrice - floorPrice;
        const contentionPeak = profile.contention_peak_hour;
        const contentionWidth = 5.0;

        // Business-hours contention spike (Gaussian centered at peak hour)
        const distance = Math.abs(hour - contentionPeak);
        const contentionComponent = priceRange * Math.exp(-(distance * distance) / (2 * contentionWidth * contentionWidth));

        // Morning ramp-up (6am-9am, linear)
        let rampComponent = 0;
        if (hour >= 6 && hour < 9) {
          rampComponent = priceRange * 0.35 * ((hour - 6) / 3.0);
        }

        // Evening decay (6pm-10pm, linear fall-off)
        let eveningComponent = 0;
        if (hour > 18 && hour <= 22) {
          eveningComponent = priceRange * 0.4 * (1 - (hour - 18) / 4.0);
        }

        // Random market noise (~1% of on-demand rate)
        const noise = seededGauss(rng, 0, onDemand * 0.01);
        const price = floorPrice + contentionComponent + rampComponent + eveningComponent + noise;

        // Clamp: allow slight undercut below floor due to noise, never exceed on-demand
        return Math.max(floorPrice * 0.85, Math.min(onDemand, price));
      }

      function calcRenewable(hour) {
        const solar = 40 * weatherFactor * Math.max(0, Math.cos(2 * Math.PI * (hour - profile.solar_peak_hour) / 24));
        const windBase = 15 + (rng() * 10 - 5);
        const wind = windBase + 10 * Math.cos(2 * Math.PI * (hour - 4) / 24);
        const baseR = region === 'NORDIC' ? 60 : 10;
        const total = baseR + solar + Math.max(0, wind);
        return Math.min(95, Math.max(5, total + seededGauss(rng, 0, 3)));
      }

      function getForecast(hours, startHour = 18) {
        const floorPrice = instanceProfile.on_demand * (1 - instanceProfile.spot_floor_discount) * 0.85;
        const ceilingPrice = instanceProfile.on_demand;

        const data = [];
        for (let i = 0; i < hours; i++) {
          const h = (startHour + i) % 24;
          const trendFactor = 1 + (i / hours) * (rng() * 0.1 - 0.05);
          let co2 = calcCarbon(h) * trendFactor;
          let price = calcPrice(h) * trendFactor;
          co2 = Math.max(50, Math.min(800, co2));
          price = Math.max(floorPrice, Math.min(ceilingPrice, price));
          data.push({
            hour: i,
            hourOfDay: h,
            co2_intensity: co2,
            price: price,
            renewable_pct: calcRenewable(h),
            label: `${String(h).padStart(2, '0')}:00`,
          });
        }
        return data;
      }

      return { getForecast, profile, instanceProfile };
    }

    /* ================================================================
       AUTOPILOT — ported from autopilot.py
       ================================================================ */
    function optimizeSchedule(forecast, durationHours, powerDrawKw, deadlineHours) {
      const energyKwh = powerDrawKw * durationHours;
      const windowsNeeded = Math.max(1, Math.round(durationHours));

      // Baseline (immediate start)
      const baselineSlice = forecast.slice(0, windowsNeeded);
      const baselineAvgPrice = baselineSlice.reduce((s, w) => s + w.price, 0) / baselineSlice.length;
      const baselineAvgCarbon = baselineSlice.reduce((s, w) => s + w.co2_intensity, 0) / baselineSlice.length;
      const baselineCost = baselineAvgPrice * durationHours;
      const baselineCarbonKg = (baselineAvgCarbon * energyKwh) / 1000;

      function scoreWindow(slice) {
        const avgP = slice.reduce((s, w) => s + w.price, 0) / slice.length;
        const avgC = slice.reduce((s, w) => s + w.co2_intensity, 0) / slice.length;
        const pNorm = Math.min(avgP / PRICE_CEILING, 1.0) * 100;
        const cNorm = Math.min(avgC / CARBON_CEILING, 1.0) * 100;
        return {
          score: pNorm * DEFAULT_PRICE_WEIGHT + cNorm * DEFAULT_CARBON_WEIGHT,
          avgPrice: avgP,
          avgCarbon: avgC,
          cost: avgP * durationHours,
          carbonKg: (avgC * energyKwh) / 1000,
        };
      }

      // Scan all feasible start times
      let bestScore = Infinity;
      let bestIdx = 0;
      let bestMetrics = scoreWindow(baselineSlice);

      const maxStartIdx = Math.min(
        forecast.length - windowsNeeded,
        Math.round(deadlineHours - durationHours)
      );

      for (let i = 0; i <= maxStartIdx; i++) {
        const slice = forecast.slice(i, i + windowsNeeded);
        if (slice.length < windowsNeeded) break;
        const m = scoreWindow(slice);
        if (m.score < bestScore) {
          bestScore = m.score;
          bestIdx = i;
          bestMetrics = m;
        }
      }

      // Cost constraint: if composite score recommends a more expensive window, fall back to minimum cost
      let costConstrained = false;
      if (bestMetrics.cost > baselineCost) {
        let minCost = Infinity;
        let minIdx = 0;
        let minMetrics = scoreWindow(baselineSlice);

        for (let i = 0; i <= maxStartIdx; i++) {
          const slice = forecast.slice(i, i + windowsNeeded);
          if (slice.length < windowsNeeded) break;
          const m = scoreWindow(slice);
          if (m.cost < minCost) {
            minCost = m.cost;
            minIdx = i;
            minMetrics = m;
          }
        }

        bestIdx = minIdx;
        bestMetrics = minMetrics;
        costConstrained = true;
      }

      return {
        baselineCost,
        baselineCarbonKg,
        baselineAvgPrice,
        baselineAvgCarbon,
        optimizedCost: bestMetrics.cost,
        optimizedCarbonKg: bestMetrics.carbonKg,
        optimizedAvgPrice: bestMetrics.avgPrice,
        optimizedAvgCarbon: bestMetrics.avgCarbon,
        costSavings: baselineCost - bestMetrics.cost,
        carbonSavingsKg: baselineCarbonKg - bestMetrics.carbonKg,
        costSavingsPercent: baselineCost > 0 ? ((baselineCost - bestMetrics.cost) / baselineCost) * 100 : 0,
        carbonSavingsPercent: baselineCarbonKg > 0 ? ((baselineCarbonKg - bestMetrics.carbonKg) / baselineCarbonKg) * 100 : 0,
        delayHours: bestIdx,
        optimalStartIdx: bestIdx,
        windowsNeeded,
        energyKwh,
        costConstrained,
      };
    }

    function useDebounce(value, delay = 150) {
      const [debounced, setDebounced] = useState(value);
      useEffect(() => {
        const t = setTimeout(() => setDebounced(value), delay);
        return () => clearTimeout(t);
      }, [value, delay]);
      return debounced;
    }

    function useCountdown(target) {
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);
      const diff = Math.max(0, target.getTime() - now);
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      return { days, hours, minutes, seconds };
    }

    function useInView(ref, opts = { threshold: 0.15 }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, opts);
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return visible;
    }

    function useAnimatedNumber(target, duration = 800, decimals = 2) {
      const [display, setDisplay] = useState(target);
      const rafRef = useRef(null);
      const prevTarget = useRef(target);

      useEffect(() => {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          setDisplay(target);
          return;
        }
        const start = prevTarget.current;
        prevTarget.current = target;
        const startTime = performance.now();

        function tick(now) {
          const p = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
          setDisplay(start + (target - start) * eased);
          if (p < 1) {
            rafRef.current = requestAnimationFrame(tick);
          } else {
            setDisplay(target);
          }
        }

        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        rafRef.current = requestAnimationFrame(tick);
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, [target, duration]);

      return display.toFixed(decimals);
    }

    /* ---- TiltCard ---- */
    function TiltCard({ children, className = '' }) {
      const cardRef = useRef(null);
      const rectRef = useRef(null);

      const handleMouseEnter = useCallback(() => {
        if (cardRef.current) rectRef.current = cardRef.current.getBoundingClientRect();
      }, []);

      const handleMouseMove = useCallback((e) => {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const rect = rectRef.current;
        if (!rect) return;
        const dx = (e.clientX - (rect.left + rect.width / 2)) / (rect.width / 2);
        const dy = (e.clientY - (rect.top + rect.height / 2)) / (rect.height / 2);
        cardRef.current.style.transform = `perspective(800px) rotateX(${-dy * 6}deg) rotateY(${dx * 6}deg)`;
      }, []);

      const handleMouseLeave = useCallback(() => {
        if (cardRef.current) {
          cardRef.current.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
        }
      }, []);

      return (
        <div
          ref={cardRef}
          className={className}
          onMouseEnter={handleMouseEnter}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{
            transition: 'transform 0.15s ease-out, border-color 0.3s, background-color 0.3s',
            willChange: 'transform'
          }}
        >
          {children}
        </div>
      );
    }
